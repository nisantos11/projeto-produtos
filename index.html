<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo Imposto Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Cálculo Imposto Produtos</h1>
            <p class="subtitle">Sistema de cadastro e cálculo automático de impostos</p>
        </header>

        <main class="main-content">
            <!-- Seção do Formulário -->
            <section class="form-section">
                <h2>Adicionar Novo Produto</h2>
                <form id="productForm" class="form">
                    <div class="form-group">
                        <label for="productName">Produto *</label>
                        <input 
                            type="text" 
                            id="productName" 
                            placeholder="Ex: Notebook" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="productCharacteristics">Características *</label>
                        <textarea 
                            id="productCharacteristics" 
                            placeholder="Ex: Intel i7, 16GB RAM, SSD 512GB" 
                            rows="3"
                            required
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="productValue">Valor Unitário (R$) *</label>
                        <input 
                            type="number" 
                            id="productValue" 
                            placeholder="0.00" 
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="productUnit">Unidade *</label>
                        <select id="productUnit" required>
                            <option value="">Selecione uma unidade</option>
                            <option value="UN">Unidade (UN)</option>
                            <option value="KG">Quilograma (KG)</option>
                            <option value="L">Litro (L)</option>
                            <option value="M">Metro (M)</option>
                            <option value="CX">Caixa (CX)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de Produto *</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="productType" value="1" required>
                                <span>Tipo 1 - Isento</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="productType" value="2" required>
                                <span>Tipo 2 - 8% de imposto</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="productType" value="3" required>
                                <span>Tipo 3 - 10% de imposto</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="productType" value="4" required>
                                <span>Tipo 4 - 12% de imposto</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="productType" value="5" required>
                                <span>Tipo 5 - 17% de imposto</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Adicionar Produto</button>
                </form>
            </section>

            <!-- Seção da Listagem -->
            <section class="list-section">
                <h2>Produtos Cadastrados</h2>
                <div id="productsList" class="products-list">
                    <p class="empty-message">Nenhum produto cadastrado ainda. Adicione um para começar!</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Cálculo Imposto Produtos. Desenvolvido para fins educacionais.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
